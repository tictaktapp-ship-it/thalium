# fly.executor.toml — App 1 (Chain Executor)
app = "thalium-chain-executor"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.executor"

[env]
  PORT = "8080"
  APP_NAME = "thalium-chain-executor"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/health"
    port = 8080
    timeout = "5s"
    type = "http"
